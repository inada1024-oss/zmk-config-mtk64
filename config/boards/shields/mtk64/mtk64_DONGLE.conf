CONFIG_ZMK_KEYBOARD_NAME="mtk64"

CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_POINTING=y
CONFIG_INPUT=y
CONFIG_PINCTRL=y

# CONFIG_ZMK_BLE=n
# CONFIG_ZMK_BLE_EXPERIMENTAL_FEATURES=y
# CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
# CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n 

CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

CONFIG_BT_BAS=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# battery level percentage
CONFIG_RGBLED_WIDGET=y 
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=50    
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=20 


# Indicate highest active layer with a constant configurable color per layer
#| Color        | Value |
#| ------------ | ----- |
#| Black (none) | `0`   |
#| Red          | `1`   |
#| Green        | `2`   |
#| Yellow       | `3`   |
#| Blue         | `4`   |
#| Magenta      | `5`   |
#| Cyan         | `6`   |
#| White        | `7`   |
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=5
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=6
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=3
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=2
CONFIG_RGBLED_WIDGET_LAYER_5_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_6_COLOR=7
# === ZMK ESB Split Settings ===
CONFIG_ZMK_BLE=n
CONFIG_ZMK_SPLIT_BLE=n
CONFIG_ZMK_SPLIT_WIRED=n
CONFIG_ZMK_SPLIT_ESB=y
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_ACK=y
CONFIG_ZMK_SPLIT_ESB_PROTO_TX_RETRANSMIT_DELAY=250
CONFIG_MPSL_TIMESLOT_SESSION_COUNT=1
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192
CONFIG_ESB_MAX_PAYLOAD_LENGTH=48
CONFIG_ESB_TX_FIFO_SIZE=1

# Config for ESB connections on dongle
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2
CONFIG_BT_MAX_PAIRED=2
CONFIG_ZMK_SPLIT_ESB_EVENT_BUFFER_ITEMS=64
CONFIG_ZMK_SPLIT_ESB_CMD_BUFFER_ITEMS=16

# Prevent dongle from idling (set to 24h) and sleeping
CONFIG_ZMK_IDLE_TIMEOUT=86400000
CONFIG_ZMK_SLEEP=n

# デバッグログ用設定
CONFIG_ZMK_USB_LOGGING=y
CONFIG_ZMK_SPLIT_ESB_LOG_LEVEL_DBG=y
